<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>電費趨勢</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #ffffff; margin: 0; padding: 20px; }
    #chart { width: 100%; height: 500px; }
    .info { color: #555; max-width: 900px; margin: 0 auto 20px; font-size: 13px; line-height: 1.6; }
    .info strong { color: #d4a017; }
  </style>
</head>
<body>

<div class="info">
  電費趨勢（2024/11 – 2026/03）｜電號：<strong>2114****105</strong>（1樓）、<strong>2114****116</strong>（2-3樓）
</div>
<div id="chart"></div>

<script>
const chart = echarts.init(document.getElementById('chart'));

const periods = [
  '113/11\n(9-10月)', '114/01\n(11-12月)', '114/03\n(1-2月)', '114/05\n(3-4月)',
  '114/07\n(5-6月)', '114/09\n(7-8月)', '114/11\n(9-10月)',
  '115/01\n(11-12月)', '115/03\n(1-2月)'
];

const floor1  = [3320, 1675, 1519, 1813, 3248, 4297, 3531, 1712, 1517];
const floor23 = [3436, 1093,  924, 1429, 4232, 7008, 4475, 1136, 1253];
const total   = floor1.map((v, i) => v + floor23[i]);

const option = {
  backgroundColor: '#ffffff',
  textStyle: { color: '#333', fontFamily: 'Segoe UI' },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(params) {
      let s = params[0].name.replace('\n', ' ') + '<br/>';
      params.forEach(function(p) {
        if (p.seriesName !== '合計') {
          s += p.marker + ' ' + p.seriesName + '：<strong>' + p.value.toLocaleString() + ' 元</strong><br/>';
        }
      });
      var last = params[params.length - 1];
      s += '<span style="display:inline-block;margin-right:5px;border-radius:10px;width:9px;height:9px;background:#ffd700"></span> ';
      s += '合計：<strong>' + last.value.toLocaleString() + ' 元</strong>';
      return s;
    }
  },
  legend: {
    data: ['1樓', '2-3樓', '合計'],
    top: 5,
    textStyle: { color: '#555' }
  },
  grid: { left: 70, right: 30, top: 50, bottom: 60 },
  xAxis: {
    type: 'category',
    data: periods,
    axisLabel: { color: '#666', fontSize: 11 },
    axisLine: { lineStyle: { color: '#ccc' } },
    axisTick: { lineStyle: { color: '#ccc' } }
  },
  yAxis: {
    type: 'value',
    name: '電費（元）',
    nameTextStyle: { color: '#666' },
    axisLabel: { color: '#666', formatter: function(v) { return v.toLocaleString(); } },
    axisLine: { lineStyle: { color: '#ccc' } },
    splitLine: { lineStyle: { color: '#e0e0e0', type: 'dashed' } }
  },
  series: [
    {
      name: '1樓',
      type: 'bar',
      stack: '電表',
      data: floor1,
      itemStyle: { color: '#4fc3f7' }
    },
    {
      name: '2-3樓',
      type: 'bar',
      stack: '電表',
      data: floor23,
      itemStyle: { color: '#ff8a65' }
    },
    {
      name: '合計',
      type: 'line',
      data: total,
      symbol: 'circle',
      symbolSize: 8,
      lineStyle: { color: '#d4a017', width: 2.5 },
      itemStyle: { color: '#d4a017', borderWidth: 2, borderColor: '#ffffff' },
      label: {
        show: true,
        position: 'top',
        color: '#d4a017',
        fontWeight: 'bold',
        formatter: function(v) { return v.value.toLocaleString(); }
      },
      smooth: 0.3,
      markLine: {
        silent: true,
        lineStyle: { color: '#ff5252', type: 'dashed', width: 1.5 },
        label: { show: true, text: '夏月', color: '#ff5252', fontSize: 11 },
        data: [{ xAxis: 5 }]
      },
      markArea: {
        silent: true,
        data: [
          [{ xAxis: 5 }, { xAxis: 5 }]
        ]
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
