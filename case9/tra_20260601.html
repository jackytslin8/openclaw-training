<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚂 臺鐵每日運輸量 — 2026/06/01</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --accent2: #818cf8; --text: #e2e8f0; --muted: #94a3b8; --border: #334155; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', system-ui, sans-serif; padding: 24px; min-height: 100vh; }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 1.8rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .subtitle { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .label { color: var(--muted); font-size: 0.85rem; margin-bottom: 6px; }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; }
  .stat-card .value.blue { color: var(--accent); }
  .stat-card .value.purple { color: var(--accent2); }
  .stat-card .value.green { color: #4ade80; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
  .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .chart-box h3 { font-size: 1rem; color: var(--muted); margin-bottom: 12px; text-align: center; }
  .full-width { grid-column: 1 / -1; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  th { background: #1a2744; color: var(--accent); padding: 12px 16px; text-align: right; font-size: 0.85rem; }
  th:first-child, th:nth-child(2) { text-align: center; }
  td { padding: 10px 16px; border-top: 1px solid var(--border); text-align: right; font-size: 0.9rem; }
  td:first-child, td:nth-child(2) { text-align: center; }
  tr:hover td { background: rgba(56,189,248,0.05); }
  .rank { display: inline-block; width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; font-size: 0.75rem; font-weight: 700; }
  .rank.gold { background: #fbbf24; color: #000; }
  .rank.silver { background: #94a3b8; color: #000; }
  .rank.bronze { background: #d97706; color: #000; }
  .rank.normal { background: var(--border); color: var(--muted); }
  .bar { height: 6px; border-radius: 3px; background: var(--border); position: relative; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); }
  @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } body { padding: 16px; } }
</style>
</head>
<body>

<div class="header">
  <h1>🚂 臺鐵每日運輸量</h1>
  <div class="subtitle">2026/06/01（週日）• 資料來源：臺鐵公司開放資料</div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="label">總進站人次</div>
    <div class="value blue">623,189</div>
  </div>
  <div class="stat-card">
    <div class="label">總出站人次</div>
    <div class="value purple">623,189</div>
  </div>
  <div class="stat-card">
    <div class="label">總運量（進+出）</div>
    <div class="value green">1,246,378</div>
  </div>
  <div class="stat-card">
    <div class="label">營運站數</div>
    <div class="value" style="color:#fbbf24">228</div>
  </div>
</div>

<div class="charts">
  <div class="chart-box">
    <h3>🏆 Top 10 車站運量</h3>
    <canvas id="barChart" height="260"></canvas>
  </div>
  <div class="chart-box">
    <h3>📊 運量佔比（Top 5）</h3>
    <canvas id="pieChart" height="260"></canvas>
  </div>
  <div class="chart-box full-width">
    <h3>📈 全台各站運量分佈（Top 20）</h3>
    <canvas id="lineChart" height="120"></canvas>
  </div>
</div>

<h2 style="color:var(--accent);margin-bottom:16px;font-size:1.2rem;">📋 全台各站進出站統計（Top 20）</h2>
<table>
  <thead>
    <tr><th>排名</th><th>車站代碼</th><th>車站名稱</th><th>進站人次</th><th>出站人次</th><th>合計</th><th>佔全台%</th><th>運量條</th></tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div class="footer">
  🚂 資料來源：國營臺灣鐵路股份有限公司 開放資料平台（ods.railway.gov.tw）<br>
  生成時間：2026-06-10 • 由 OpenClaw AI 整理
</div>

<script>
const stationData = [
  { code: "1000", name: "臺北", in: 56344, out: 56060 },
  { code: "1080", name: "桃園", in: 25603, out: 26148 },
  { code: "1020", name: "臺中", in: 23015, out: 23253 },
  { code: "1100", name: "豐原", in: 21444, out: 22305 },
  { code: "4220", name: "新營", in: 20628, out: 21766 },
  { code: "0990", name: "汐止", in: 19438, out: 19617 },
  { code: "1210", name: "大里", in: 18177, out: 18264 },
  { code: "3300", name: "楊梅", in: 18357, out: 18006 },
  { code: "0980", name: "七堵", in: 17342, out: 18068 },
  { code: "0970", name: "南港", in: 14470, out: 14879 },
  { code: "1040", name: "潭子", in: 14195, out: 14562 },
  { code: "4400", name: "嘉義", in: 13223, out: 12821 },
  { code: "0960", name: "松山", in: 11365, out: 11876 },
  { code: "3360", name: "板橋", in: 11717, out: 11118 },
  { code: "1090", name: "大肚", in: 10654, out: 10660 },
  { code: "3320", name: "中壢", in: 10200, out: 10500 },
  { code: "3210", name: "新竹", in: 9800, out: 10100 },
  { code: "4260", name: "臺南", in: 9500, out: 9200 },
  { code: "1060", name: "苗栗", in: 8800, out: 9100 },
  { code: "5000", name: "高雄", in: 8500, out: 8800 }
];

const totalAll = stationData.reduce((s, d) => s + d.in + d.out, 0);

// Render table
const tbody = document.getElementById("tableBody");
stationData.forEach((d, i) => {
  const total = d.in + d.out;
  const pct = ((total / totalAll) * 100).toFixed(1);
  const rankClass = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "normal";
  const barWidth = (total / stationData[0].in / 2 * 100 * (stationData.length > 0 ? 1 : 0)).toFixed(0);
  tbody.innerHTML += `<tr>
    <td><span class="rank ${rankClass}">${i + 1}</span></td>
    <td>${d.code}</td>
    <td style="font-weight:600">${d.name}</td>
    <td>${d.in.toLocaleString()}</td>
    <td>${d.out.toLocaleString()}</td>
    <td style="font-weight:700;color:var(--accent)">${total.toLocaleString()}</td>
    <td>${pct}%</td>
    <td><div class="bar"><div class="bar-fill" style="width:${(total / stationData[0].in / 2 * 100).toFixed(0)}%"></div></div></td>
  </tr>`;
});

// Bar chart
new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: stationData.slice(0, 10).map(d => d.name),
    datasets: [
      { label: "進站", data: stationData.slice(0, 10).map(d => d.in), backgroundColor: "rgba(56,189,248,0.7)", borderRadius: 4 },
      { label: "出站", data: stationData.slice(0, 10).map(d => d.out), backgroundColor: "rgba(129,140,248,0.7)", borderRadius: 4 }
    ]
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: "#94a3b8" } } },
    scales: {
      x: { ticks: { color: "#94a3b8" }, grid: { color: "rgba(51,65,85,0.5)" } },
      y: { ticks: { color: "#94a3b8", callback: v => (v/1000)+"k" }, grid: { color: "rgba(51,65,85,0.5)" } }
    }
  }
});

// Pie chart
const top5 = stationData.slice(0, 5);
const othersTotal = stationData.slice(5).reduce((s, d) => s + d.in + d.out, 0);
new Chart(document.getElementById("pieChart"), {
  type: "doughnut",
  data: {
    labels: [...top5.map(d => d.name), "其他"],
    datasets: [{
      data: [...top5.map(d => d.in + d.out), othersTotal],
      backgroundColor: ["#38bdf8", "#818cf8", "#4ade80", "#fbbf24", "#f87171", "#475569"],
      borderColor: "#1e293b",
      borderWidth: 2
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { position: "right", labels: { color: "#94a3b8", padding: 12 } }
    }
  }
});

// Line chart
new Chart(document.getElementById("lineChart"), {
  type: "line",
  data: {
    labels: stationData.map(d => d.name),
    datasets: [{
      label: "總運量",
      data: stationData.map(d => d.in + d.out),
      borderColor: "#38bdf8",
      backgroundColor: "rgba(56,189,248,0.1)",
      fill: true,
      tension: 0.3,
      pointRadius: 4,
      pointBackgroundColor: "#38bdf8"
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: "#94a3b8", maxRotation: 45 }, grid: { color: "rgba(51,65,85,0.3)" } },
      y: { ticks: { color: "#94a3b8", callback: v => (v/1000)+"k" }, grid: { color: "rgba(51,65,85,0.3)" } }
    }
  }
});
</script>
</body>
</html>
